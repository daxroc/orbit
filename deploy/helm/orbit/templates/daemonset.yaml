{{- if eq .Values.mode "daemonset" }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "orbit.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "orbit.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "orbit.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "orbit.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "orbit.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: orbit
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --mode={{ .Values.config.mode }}
            - --grpc-port={{ .Values.config.grpcPort }}
            - --http-port={{ .Values.config.httpPort }}
            - --tcp-receiver-port-start={{ .Values.config.tcpReceiverPortStart }}
            - --udp-receiver-port-start={{ .Values.config.udpReceiverPortStart }}
            - --log-level={{ .Values.config.logLevel }}
            - --log-format={{ .Values.config.logFormat }}
            - --service-name={{ include "orbit.fullname" . }}
            - --leader-election-id={{ include "orbit.fullname" . }}-leader
            - --leader-election-namespace={{ .Release.Namespace }}
            - --scenarios-config-path=/etc/orbit/scenarios.yaml
            {{- if .Values.config.metricsProtected }}
            - --metrics-protected
            {{- end }}
          env:
            - name: ORBIT_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: ORBIT_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: ORBIT_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: ORBIT_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "orbit.authSecretName" . }}
                  key: {{ .Values.auth.existingSecretKey | default "token" }}
          ports:
            - name: http
              containerPort: {{ .Values.config.httpPort }}
              protocol: TCP
            - name: grpc
              containerPort: {{ .Values.config.grpcPort }}
              protocol: TCP
            - name: tcp-recv
              containerPort: {{ .Values.config.tcpReceiverPortStart }}
              protocol: TCP
            - name: udp-recv
              containerPort: {{ .Values.config.udpReceiverPortStart }}
              protocol: UDP
            - name: http-echo
              containerPort: {{ add .Values.config.httpPort 1 }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: scenarios
              mountPath: /etc/orbit
              readOnly: true
      volumes:
        - name: scenarios
          configMap:
            name: {{ include "orbit.fullname" . }}-scenarios
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
