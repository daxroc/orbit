{{- if .Values.satellite.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "orbit.fullname" . }}-satellite
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "orbit.labels" . | nindent 4 }}
    app.kubernetes.io/component: satellite
spec:
  replicas: {{ .Values.satellite.replicaCount }}
  selector:
    matchLabels:
      {{- include "orbit.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: satellite
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "orbit.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: satellite
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "orbit.serviceAccountName" . }}
      containers:
        - name: orbit-satellite
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --mode=satellite
            - --grpc-port={{ .Values.config.grpcPort }}
            - --http-port={{ .Values.config.httpPort }}
            - --tcp-receiver-port-start={{ .Values.config.tcpReceiverPortStart }}
            - --udp-receiver-port-start={{ .Values.config.udpReceiverPortStart }}
            - --log-level={{ .Values.config.logLevel }}
            - --log-format={{ .Values.config.logFormat }}
          env:
            - name: ORBIT_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: ORBIT_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: ORBIT_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: ORBIT_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "orbit.authSecretName" . }}
                  key: {{ .Values.auth.existingSecretKey | default "token" }}
          ports:
            - name: http
              containerPort: {{ .Values.config.httpPort }}
              protocol: TCP
            - name: grpc
              containerPort: {{ .Values.config.grpcPort }}
              protocol: TCP
            - name: tcp-recv
              containerPort: {{ .Values.config.tcpReceiverPortStart }}
              protocol: TCP
            - name: udp-recv
              containerPort: {{ .Values.config.udpReceiverPortStart }}
              protocol: UDP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          {{- with .Values.satellite.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.satellite.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.satellite.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.satellite.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
