replicaCount: 1

mode: daemonset

image:
  repository: orbit
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

auth:
  token: ""
  existingSecret: ""
  existingSecretKey: "token"

config:
  mode: cluster
  logLevel: info
  logFormat: json
  grpcPort: 9090
  httpPort: 8080
  tcpReceiverPortStart: 10000
  udpReceiverPortStart: 11000
  probeInterval: 10s
  discoveryPeriod: 5s
  metricsProtected: false
  activeScenario: ""
  scheduleLeaseTTL: 30s
  heartbeatInterval: 10s

scenarios:
  baseline:
    description: "Zero traffic — measure eBPF overhead with no application load"
    eastWest: []
    northSouth: []

  steady-low:
    description: "Low sustained load for long-running accuracy tests"
    eastWest:
      - type: tcp-stream
        bandwidthMbps: 10
        durationSeconds: 0
        payloadBytes: 1400
      - type: http
        rps: 10
        payloadBytes: 512
        ## workers: number of concurrent HTTP client goroutines (default: 4).
        ## keepAlive: reuse TCP connections across requests (default: false).
        ## When keepAlive is false, each request opens a new TCP connection.
        # workers: 4
        # keepAlive: true
    northSouth: []

  steady-high:
    description: "High sustained load for throughput accuracy"
    eastWest:
      - type: tcp-stream
        bandwidthMbps: 100
        connections: 8
      - type: udp-stream
        packetRate: 10000
        packetSize: 1400
      ## At high RPS, consider enabling workers and keepAlive. Without
      ## keepAlive each request opens a new TCP connection, which can
      ## saturate conntrack tables or trigger SYN rate limiting depending
      ## on the network environment.
      - type: http
        rps: 1000
        payloadBytes: 4096
        workers: 100
        keepAlive: true
    northSouth: []

  burst:
    description: "Traffic spikes to test eBPF buffering/sampling behavior"
    eastWest:
      - type: tcp-stream
        pattern: burst
        burstDurationSeconds: 5
        burstIntervalSeconds: 30
        bandwidthMbps: 500
    northSouth: []

  connection-churn:
    description: "Rapid connection lifecycle for conntrack validation"
    ## holdDurationMs controls how long each TCP connection is held open.
    ## Lower values increase concurrent SYN pressure on the network.
    ## connectionsPerSecond controls the rate of new TCP connections.
    ## High values may trigger SYN rate limiting depending on the network.
    ## Monitor orbit_wire_segments_retransmitted_total for packet loss.
    eastWest:
      - type: connection-churn
        connectionsPerSecond: 50
        holdDurationMs: 500
    northSouth: []

  protocol-matrix:
    description: "All protocols simultaneously for completeness check"
    eastWest:
      - type: tcp-stream
        bandwidthMbps: 50
      - type: udp-stream
        packetRate: 5000
      - type: http
        rps: 100
        workers: 30
        keepAlive: true
      - type: grpc
        rps: 100
      - type: icmp
        intervalMs: 100
      - type: connection-churn
        connectionsPerSecond: 50
        holdDurationMs: 500
    northSouth: []

  ## Example: scenario with direct north-south flows. These are merged
  ## with any registered satellite flows at activation time. Satellites
  ## can be registered under northSouth.satellites below.
  ## See deploy/compose/README.md for running an external satellite.
  #
  # north-south-direct:
  #   description: "Direct north-south flows to an external endpoint"
  #   eastWest: []
  #   northSouth:
  #     - type: http
  #       url: "<EXTERNAL_HOST>:8080"
  #       rps: 50
  #       payloadBytes: 1024
  #     - type: tcp-stream
  #       address: "<EXTERNAL_HOST>:10000"
  #       bandwidthMbps: 10
  #       payloadBytes: 1400

northSouth:
  satellites: []
  ## Example: register an external satellite running via Docker Compose
  ## (see deploy/compose/README.md). Satellite flows are started automatically
  ## whenever any scenario is activated and appear in metrics with
  ## direction="north-south". Target URLs/addresses are resolved from the
  ## satellite's host + standard ports (override per-satellite if needed).
  ## Auth defaults to the cluster's auth.token; set authToken to override.
  ## NOTE: authToken is stored in plaintext in the ConfigMap. For
  ## sensitive environments, use the same token as auth.token and
  ## manage it via auth.existingSecret instead.
  #
  # satellites:
  #   - name: satellite-01
  #     host: "<SATELLITE_HOST>"
  #     # httpPort: 8080       # default
  #     # grpcPort: 9090       # default
  #     # tcpPort: 10000       # default
  #     # udpPort: 11000       # default
  #     # authToken: ""        # defaults to auth.token
  #     flows:
  #       - type: http
  #         rps: 50
  #         payloadBytes: 1024
  #       - type: tcp-stream
  #         bandwidthMbps: 10
  #         payloadBytes: 1400
  #       - type: udp-stream
  #         packetRate: 1000
  #         packetSize: 1400
  targets: []

serviceAccount:
  create: true
  annotations: {}
  name: ""

rbac:
  create: true

podAnnotations: {}
podLabels: {}

podSecurityContext: {}

securityContext:
  capabilities:
    add:
      - NET_RAW
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65534

service:
  type: ClusterIP
  httpPort: 8080
  grpcPort: 9090

serviceMonitor:
  enabled: false
  interval: 15s
  scrapeTimeout: 10s
  labels: {}
  namespace: ""
  honorLabels: true
  satelliteServiceMonitor:
    enabled: false
    interval: 15s
    scrapeTimeout: 10s
    labels: {}
    annotations: {}

podDisruptionBudget:
  enabled: false
  minAvailable: 1

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: "1"
    memory: 512Mi

nodeSelector: {}

tolerations: []

affinity: {}

tls:
  enabled: false
  caFile: ""   # path to CA cert, mounted via secret/configmap

satellite:
  enabled: false
  replicaCount: 1
  nodeSelector: {}
  tolerations: []
  affinity: {}
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
